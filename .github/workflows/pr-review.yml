name: PR自動レビュー

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-review:
    name: PR自動チェック
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR情報を取得
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            let allFiles = files;
            if (files.length === 100) {
              let page = 2;
              while (true) {
                const { data: moreFiles } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  per_page: 100,
                  page: page
                });
                allFiles = allFiles.concat(moreFiles);
                if (moreFiles.length < 100) break;
                page++;
              }
            }

            core.setOutput('files', JSON.stringify(allFiles));
            core.setOutput('file_count', allFiles.length);

            let totalChanges = 0;
            for (const file of allFiles) {
              totalChanges += file.additions + file.deletions;
            }
            core.setOutput('total_changes', totalChanges);

      - name: diff内容を取得
        id: pr-diff
        uses: actions/github-script@v7
        with:
          script: |
            const { data: diff } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              mediaType: { format: 'diff' }
            });
            const fs = require('fs');
            fs.writeFileSync('/tmp/pr.diff', diff);

      - name: 自動レビューを実行
        id: review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = JSON.parse(process.env.PR_FILES);
            const fileCount = parseInt('${{ steps.pr-info.outputs.file_count }}');
            const totalChanges = parseInt('${{ steps.pr-info.outputs.total_changes }}');

            let diff = '';
            try {
              diff = fs.readFileSync('/tmp/pr.diff', 'utf8');
            } catch (e) {
              core.warning('diffファイルの読み込みに失敗しました');
            }

            const results = [];
            let hasWarning = false;

            // (a) サイズチェック
            if (totalChanges > 500) {
              results.push(`⚠️ **変更行数チェック**: **${totalChanges}行** 変更（推奨上限: 500行）。分割を検討してください。`);
              hasWarning = true;
            } else {
              results.push(`✅ **変更行数チェック**: ${totalChanges}行（推奨上限: 500行以内）`);
            }

            // (b) ファイル数チェック
            if (fileCount > 20) {
              results.push(`⚠️ **変更ファイル数チェック**: **${fileCount}ファイル**（推奨上限: 20ファイル）`);
              hasWarning = true;
            } else {
              results.push(`✅ **変更ファイル数チェック**: ${fileCount}ファイル（推奨上限: 20ファイル以内）`);
            }

            // (c) Designer.vb チェック
            const designerFiles = files
              .filter(f => f.filename.endsWith('.Designer.vb'))
              .map(f => f.filename);
            if (designerFiles.length > 0) {
              const fileList = designerFiles.map(f => `  - \`${f}\``).join('\n');
              results.push(`⚠️ **Designer.vbチェック**: 自動生成ファイルが変更されています。\n${fileList}`);
              hasWarning = true;
            } else {
              results.push(`✅ **Designer.vbチェック**: 自動生成ファイルの手動変更なし`);
            }

            // (d) 接続文字列チェック
            const credentialPatterns = [
              /(?:Password|Pwd)\s*=\s*["'][^"']+["']/gi,
              /(?:User\s*Id|Uid)\s*=\s*["'][^"']+["']/gi,
              /connectionstring\s*=\s*["'][^"']+["']/gi
            ];
            const credentialIssues = [];
            const addedLines = diff.split('\n');
            for (const line of addedLines) {
              if (!line.startsWith('+') || line.startsWith('+++')) continue;
              for (const pattern of credentialPatterns) {
                pattern.lastIndex = 0;
                if (pattern.test(line)) {
                  const cleanLine = line.substring(1).trim();
                  credentialIssues.push(`  - \`${cleanLine.substring(0, 120)}\``);
                  break;
                }
              }
            }
            if (credentialIssues.length > 0) {
              results.push(`⚠️ **接続文字列チェック**: ハードコードされた資格情報が検出されました。\n${[...new Set(credentialIssues)].join('\n')}`);
              hasWarning = true;
            } else {
              results.push(`✅ **接続文字列チェック**: ハードコードされた資格情報なし`);
            }

            // (e) TODO/FIXME チェック
            const todoPattern = /(?:TODO|FIXME|HACK)[\s:：](.+)/gi;
            const todoItems = [];
            let currentFile = '';
            for (const line of addedLines) {
              if (line.startsWith('diff --git')) {
                const match = line.match(/b\/(.+)$/);
                if (match) currentFile = match[1];
              }
              if (line.startsWith('+') && !line.startsWith('+++')) {
                todoPattern.lastIndex = 0;
                let match;
                while ((match = todoPattern.exec(line)) !== null) {
                  const keyword = line.match(/(TODO|FIXME|HACK)/i)[0].toUpperCase();
                  todoItems.push(`  - **[${keyword}]** \`${currentFile}\`: ${match[1].trim()}`);
                }
              }
            }
            if (todoItems.length > 0) {
              results.push(`⚠️ **TODO/FIXMEチェック**: ${todoItems.length}件 検出\n${todoItems.join('\n')}`);
              hasWarning = true;
            } else {
              results.push(`✅ **TODO/FIXMEチェック**: 新しいTODO/FIXME なし`);
            }

            // (f) 命名規則チェック
            const validPrefixes = ['f_', 'fc_', 'f_flx_', 'f_M_', 'f_REF_'];
            const namingIssues = [];
            const newVbFiles = files.filter(f =>
              f.filename.endsWith('.vb') &&
              !f.filename.endsWith('.Designer.vb') &&
              f.status === 'added'
            );
            for (const file of newVbFiles) {
              const fileName = file.filename.split('/').pop();
              if (fileName.startsWith('Form_')) {
                const nameAfter = fileName.replace('Form_', '').replace('.vb', '');
                if (!validPrefixes.some(p => nameAfter.startsWith(p))) {
                  namingIssues.push(`  - \`${file.filename}\``);
                }
              }
            }
            if (namingIssues.length > 0) {
              results.push(`⚠️ **命名規則チェック**: 規則に従っていないファイル:\n${namingIssues.join('\n')}`);
              hasWarning = true;
            } else {
              results.push(`✅ **命名規則チェック**: 命名規則に準拠`);
            }

            // コメント投稿
            const header = hasWarning
              ? '## PR自動レビュー結果\n\n⚠️ いくつかの項目で確認が必要です。\n'
              : '## PR自動レビュー結果\n\n✅ すべてのチェックに合格しました。\n';

            const body = [header, '---', '', results.join('\n\n'), '', '---',
              '', '> このレビューは自動生成です。詳細はレビュアーが確認してください。'].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR自動レビュー結果')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
          env:
            PR_FILES: ${{ steps.pr-info.outputs.files }}
