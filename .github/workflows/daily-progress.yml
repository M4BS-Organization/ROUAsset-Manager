name: Daily Progress Report

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 平日 UTC 0:00 (JST 9:00)
  workflow_dispatch:

permissions:
  issues: read
  pull-requests: read

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: 進捗レポートを生成・送信
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Issue 統計
            const openIssues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100
            });
            const closedIssues = await github.rest.issues.listForRepo({
              owner, repo, state: 'closed', per_page: 100
            });

            const totalOpen = openIssues.data.filter(i => !i.pull_request).length;
            const totalClosed = closedIssues.data.filter(i => !i.pull_request).length;
            const total = totalOpen + totalClosed;
            const progress = total > 0 ? Math.round((totalClosed / total) * 100) : 0;

            // 今週クローズされた Issue
            const oneWeekAgo = new Date();
            oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
            const recentClosed = closedIssues.data.filter(i =>
              !i.pull_request && new Date(i.closed_at) > oneWeekAgo
            );

            // オープン PR
            const openPRs = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });

            // Phase 別進捗
            const phases = [
              { name: 'Phase 1: 基盤修正', issues: [2,3,4,5,6,7] },
              { name: 'Phase 2: 仕訳出力検証', issues: [8,9,10,11,12,13] },
              { name: 'Phase 3: 動作確認', issues: [14,15,16,17] }
            ];

            let phaseReport = '';
            for (const phase of phases) {
              let closed = 0;
              for (const num of phase.issues) {
                try {
                  const issue = await github.rest.issues.get({ owner, repo, issue_number: num });
                  if (issue.data.state === 'closed') closed++;
                } catch (e) { /* skip */ }
              }
              const pct = Math.round((closed / phase.issues.length) * 100);
              const bar = '█'.repeat(Math.round(pct / 10)) + '░'.repeat(10 - Math.round(pct / 10));
              phaseReport += `${phase.name}: ${bar} ${pct}% (${closed}/${phase.issues.length})\n`;
            }

            // Slack メッセージ
            const message = {
              text: `:chart_with_upwards_trend: *M4BS 日次進捗レポート*\n` +
                `日付: ${new Date().toLocaleDateString('ja-JP')}\n\n` +
                `*全体進捗: ${progress}% (${totalClosed}/${total})*\n` +
                `:green_circle: オープン: ${totalOpen}  :white_check_mark: クローズ: ${totalClosed}\n` +
                `:arrows_counterclockwise: オープンPR: ${openPRs.data.length}\n\n` +
                `*Phase 別進捗:*\n\`\`\`\n${phaseReport}\`\`\`\n` +
                (recentClosed.length > 0
                  ? `*今週クローズ:*\n${recentClosed.map(i => `  :white_check_mark: #${i.number} ${i.title}`).join('\n')}\n`
                  : '') +
                (openPRs.data.length > 0
                  ? `*オープンPR:*\n${openPRs.data.map(p => `  :memo: #${p.number} ${p.title} (@${p.user.login})`).join('\n')}`
                  : '')
            };

            // Slack 送信
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (webhookUrl) {
              const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
              });
              console.log(`Slack 送信結果: ${response.status}`);
            } else {
              console.log('SLACK_WEBHOOK_URL が設定されていません');
              console.log(message.text);
            }
