name: Slack Notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed]
  issues:
    types: [opened, closed]

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: main へのプッシュを通知
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 未設定のためスキップ"
            exit 0
          fi

          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \":rocket: *main にプッシュ*\n> ${COMMIT_MSG}\n担当: ${AUTHOR}\n<${COMMIT_URL}|コミットを確認>\"
            }"

  notify-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PR イベントを通知
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 未設定のためスキップ"
            exit 0
          fi

          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          TITLE="${{ github.event.pull_request.title }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          URL="${{ github.event.pull_request.html_url }}"
          NUMBER="${{ github.event.pull_request.number }}"

          if [ "$ACTION" = "opened" ]; then
            EMOJI=":memo:"
            STATUS="新規作成"
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            EMOJI=":white_check_mark:"
            STATUS="マージ完了"
          elif [ "$ACTION" = "closed" ]; then
            EMOJI=":x:"
            STATUS="クローズ"
          fi

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${EMOJI} *PR #${NUMBER} ${STATUS}*\n> ${TITLE}\n担当: ${AUTHOR}\n<${URL}|PRを確認>\"
            }"

  notify-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Issue イベントを通知
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 未設定のためスキップ"
            exit 0
          fi

          ACTION="${{ github.event.action }}"
          TITLE="${{ github.event.issue.title }}"
          NUMBER="${{ github.event.issue.number }}"
          URL="${{ github.event.issue.html_url }}"
          ASSIGNEE="${{ github.event.issue.assignee.login }}"
          if [ -z "$ASSIGNEE" ]; then ASSIGNEE="未アサイン"; fi

          if [ "$ACTION" = "opened" ]; then
            EMOJI=":new:"
            STATUS="新規作成"
          else
            EMOJI=":done:"
            STATUS="クローズ"
          fi

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${EMOJI} *Issue #${NUMBER} ${STATUS}*\n> ${TITLE}\n担当: ${ASSIGNEE}\n<${URL}|Issueを確認>\"
            }"
