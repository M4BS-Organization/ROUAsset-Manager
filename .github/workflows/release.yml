name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: MSBuild セットアップ
        uses: microsoft/setup-msbuild@v2

      - name: NuGet セットアップ
        uses: nuget/setup-nuget@v2

      - name: NuGet パッケージ復元
        run: nuget restore LeaseM4BS\LeaseM4BS.slnx

      - name: Release ビルド
        run: msbuild LeaseM4BS\LeaseM4BS.slnx /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: ビルド成果物をZIP化
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "LeaseM4BS\LeaseM4BS.DataAccess\bin\Release\*" -DestinationPath "LeaseM4BS-${tag}.zip"

      - name: GitHub Release 作成
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: LeaseM4BS-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
