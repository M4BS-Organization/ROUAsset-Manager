name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: diff を取得
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.vb' '*.yml' '*.sh' | head -c 50000)
          echo "diff<<EODIFF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EODIFF" >> "$GITHUB_OUTPUT"

      - name: Gemini API でレビュー
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY 未設定のためスキップ"
            exit 0
          fi

          DIFF=$(cat <<'EODIFF'
          ${{ steps.diff.outputs.diff }}
          EODIFF
          )

          PAYLOAD=$(jq -n \
            --arg diff "$DIFF" \
            --arg title "${{ github.event.pull_request.title }}" \
            '{
              contents: [{
                parts: [{
                  text: ("以下のPR差分をレビューしてください。\nPRタイトル: " + $title + "\n\n観点:\n1. VB.NET コード品質・型安全性\n2. PostgreSQL (Npgsql) データアクセスパターン\n3. WinForms リソース管理\n4. セキュリティ (SQLインジェクション等)\n5. エラーハンドリング\n\n日本語でレビューし、重要な問題のみ指摘してください。問題がなければ「LGTM」と書いてください。\n\n```diff\n" + $diff + "\n```")
                }]
              }],
              generationConfig: {
                maxOutputTokens: 4096
              }
            }')

          RESPONSE=$(curl -sf \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "レビュー取得に失敗しました"')

          echo "review<<EOREVIEW" >> "$GITHUB_OUTPUT"
          echo "$REVIEW" >> "$GITHUB_OUTPUT"
          echo "EOREVIEW" >> "$GITHUB_OUTPUT"

      - name: レビューコメントを投稿
        if: steps.review.outputs.review != ''
        uses: actions/github-script@v7
        with:
          script: |
            const review = process.env.REVIEW_BODY;
            if (!review) return;

            const body = `## Gemini Code Review\n\n${review}\n\n---\n> Reviewed by Gemini (gemini-2.5-flash)`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Gemini Code Review')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
        env:
          REVIEW_BODY: ${{ steps.review.outputs.review }}
