name: Notify CI Failure

on:
  workflow_run:
    workflows: ["CI", "Equivalence Test"]
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on CI failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          WORKFLOW="${{ github.event.workflow_run.name }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"
          COMMIT_MSG=$(echo "${{ github.event.workflow_run.head_commit.message }}" | head -1)

          curl -s -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"🔴 CI 失敗: ${WORKFLOW}\",
                    \"emoji\": true
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*ブランチ:*\n\`${BRANCH}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*実行者:*\n${ACTOR}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*コミット:*\n${COMMIT_MSG}\"}
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": {\"type\": \"plain_text\", \"text\": \"ログを確認\"},
                      \"url\": \"${RUN_URL}\"
                    }
                  ]
                }
              ]
            }" "$SLACK_WEBHOOK_URL"
