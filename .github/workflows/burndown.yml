name: Sprint Burn-Up

on:
  schedule:
    # 毎日 18:00 JST (09:00 UTC) に実行
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 手動実行も可能

env:
  PROJECT_NUMBER: 3
  ORG: M4BS-Organization
  BURNUP_ISSUE: 10

jobs:
  burnup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: read
    steps:
      - name: Calculate and notify
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # --- GraphQL でプロジェクトアイテムを Iteration 付きで取得 ---
          QUERY='
          query($org: String!, $num: Int!) {
            organization(login: $org) {
              projectV2(number: $num) {
                items(first: 100) {
                  nodes {
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldIterationValue {
                          title
                          startDate
                          duration
                          field { ... on ProjectV2IterationField { name } }
                        }
                        ... on ProjectV2ItemFieldNumberValue {
                          number
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                      }
                    }
                    content {
                      ... on Issue {
                        title
                        number
                      }
                    }
                  }
                }
              }
            }
          }'

          RAW=$(gh api graphql \
            -f query="$QUERY" \
            -f org="$ORG" \
            -F num="$PROJECT_NUMBER")

          # --- 今日の日付（UTC）を取得し、現在の Iteration を特定 ---
          TODAY=$(date +%Y-%m-%d)

          # jq で各アイテムを平坦化し、iteration の期間に今日が含まれるものだけ抽出
          ITEMS=$(echo "$RAW" | jq --arg today "$TODAY" '
            [
              .data.organization.projectV2.items.nodes[] |
              {
                title: (.content.title // "untitled"),
                number: (.content.number // null),
                status: (
                  [.fieldValues.nodes[] |
                    select(.field?.name? == "Status") | .name
                  ] | first // "No Status"
                ),
                sp: (
                  [.fieldValues.nodes[] |
                    select(.field?.name? == "Story Points" or .field?.name? == "story Points" or .field?.name? == "SP") | .number
                  ] | first // 0
                ),
                iteration: (
                  [.fieldValues.nodes[] |
                    select(.field?.name? == "Iteration" or .field?.name? == "Sprint") |
                    {title: .title, startDate: .startDate, duration: .duration}
                  ] | first // null
                )
              } |
              # 現在の Iteration に含まれるアイテムのみ抽出
              select(
                .iteration != null and
                .iteration.startDate != null and
                .iteration.duration != null and
                (.iteration.startDate <= $today) and
                (
                  (.iteration.startDate | strptime("%Y-%m-%d") | mktime) +
                  (.iteration.duration * 86400)
                  > ($today | strptime("%Y-%m-%d") | mktime)
                )
              )
            ]
          ')

          # 現在の Sprint 名を取得
          SPRINT_NAME=$(echo "$ITEMS" | jq -r '.[0].iteration.title // "N/A"')

          # --- SP 集計（現在の Sprint のタスクのみ） ---
          TOTAL_SP=$(echo "$ITEMS" | jq '[.[].sp] | add // 0')
          DONE_SP=$(echo "$ITEMS" | jq '[.[] | select(.status == "Done") | .sp] | add // 0')
          IN_PROGRESS_SP=$(echo "$ITEMS" | jq '[.[] | select(.status == "In Progress") | .sp] | add // 0')
          REMAINING_SP=$((TOTAL_SP - DONE_SP))

          # 曜日を取得 (JST)
          DAY=$(TZ=Asia/Tokyo date +%a)
          DATE=$(TZ=Asia/Tokyo date +%m/%d)
          case $DAY in
            Mon) DAY_JP="月" ;; Tue) DAY_JP="火" ;; Wed) DAY_JP="水" ;;
            Thu) DAY_JP="木" ;; Fri) DAY_JP="金" ;; *)   DAY_JP="—" ;;
          esac

          # 進捗率
          if [ "$TOTAL_SP" -gt 0 ]; then
            PCT=$((DONE_SP * 100 / TOTAL_SP))
          else
            PCT=0
          fi

          # 状態判定（消化率ベース）
          if [ "$PCT" -ge 80 ]; then
            STATUS="🚀 ほぼ完了"
          elif [ "$PCT" -ge 50 ]; then
            STATUS="✅ 順調"
          elif [ "$PCT" -ge 25 ]; then
            STATUS="⚠️ やや遅れ"
          else
            STATUS="🔴 遅れ"
          fi

          # Issue リスト（現在の Sprint のみ）
          DONE_LIST=$(echo "$ITEMS" | jq -r '[.[] | select(.status == "Done") | "✅ \(.title) (\(.sp)SP)"] | join("\n")' || echo "なし")
          PROGRESS_LIST=$(echo "$ITEMS" | jq -r '[.[] | select(.status == "In Progress") | "🔧 \(.title) (\(.sp)SP)"] | join("\n")' || echo "なし")
          TODO_LIST=$(echo "$ITEMS" | jq -r '[.[] | select(.status == "Todo") | "📋 \(.title) (\(.sp)SP)"] | join("\n")' || echo "なし")

          # バーンアップチャート（テキスト）— 20文字幅
          DONE_FILLED=$((TOTAL_SP > 0 ? DONE_SP * 20 / TOTAL_SP : 0))
          PROGRESS_FILLED=$((TOTAL_SP > 0 ? IN_PROGRESS_SP * 20 / TOTAL_SP : 0))

          DONE_BAR=$(printf '█%.0s' $(seq 1 $DONE_FILLED) 2>/dev/null || true)
          PROGRESS_BAR=$(printf '▓%.0s' $(seq 1 $PROGRESS_FILLED) 2>/dev/null || true)
          REMAIN_LEN=$((20 - DONE_FILLED - PROGRESS_FILLED))
          if [ "$REMAIN_LEN" -gt 0 ]; then
            REMAIN_BAR=$(printf '░%.0s' $(seq 1 $REMAIN_LEN) 2>/dev/null || true)
          else
            REMAIN_BAR=""
          fi

          CHART_DONE="${DONE_BAR}${PROGRESS_BAR}${REMAIN_BAR}"

          # --- Slack 通知 ---
          SLACK_PAYLOAD=$(cat <<PAYLOAD
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "📈 バーンアップ  ${DATE}(${DAY_JP}) — ${SPRINT_NAME}",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*スコープ:*\n${TOTAL_SP} SP"},
                  {"type": "mrkdwn", "text": "*消化:*\n${DONE_SP} SP"},
                  {"type": "mrkdwn", "text": "*進行中:*\n${IN_PROGRESS_SP} SP"},
                  {"type": "mrkdwn", "text": "*残:*\n${REMAINING_SP} SP"}
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*消化*  \`${CHART_DONE}\` ${PCT}%\n█ Done(${DONE_SP})  ▓ 進行中(${IN_PROGRESS_SP})  ░ 残(${REMAINING_SP})"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*状態:* ${STATUS}"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Done:*\n${DONE_LIST:-なし}\n\n*In Progress:*\n${PROGRESS_LIST:-なし}\n\n*Todo:*\n${TODO_LIST:-なし}"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<https://github.com/orgs/M4BS-Organization/projects/3|📋 Project Board> | <https://github.com/M4BS-Organization/ROUAsset-Manager/issues/10|📈 バーンアップIssue>"
                  }
                ]
              }
            ]
          }
          PAYLOAD
          )

          curl -s -X POST -H 'Content-type: application/json' \
            --data "$SLACK_PAYLOAD" \
            "$SLACK_WEBHOOK_URL"

          echo "Slack notification sent"

          # --- GitHub Issue にも記録 ---
          gh issue comment $BURNUP_ISSUE \
            --repo "$ORG/ROUAsset-Manager" \
            --body "## 📈 バーンアップ ${DATE}(${DAY_JP}) — ${SPRINT_NAME}

          | スコープ | 消化 | 進行中 | 残 | 状態 |
          |---------|------|--------|-----|------|
          | **${TOTAL_SP}** SP | **${DONE_SP}** SP | **${IN_PROGRESS_SP}** SP | **${REMAINING_SP}** SP | ${STATUS} |

          \`\`\`
          消化  ${CHART_DONE} ${PCT}%
          █ Done(${DONE_SP})  ▓ 進行中(${IN_PROGRESS_SP})  ░ 残(${REMAINING_SP})
          \`\`\`

          **Done:** ${DONE_LIST:-なし}
          **In Progress:** ${PROGRESS_LIST:-なし}
          **Todo:** ${TODO_LIST:-なし}"
