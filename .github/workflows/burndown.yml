name: Sprint Burn-Up

on:
  schedule:
    # 毎日 18:00 JST (09:00 UTC) に実行
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 手動実行も可能

env:
  PROJECT_NUMBER: 3
  ORG: M4BS-Organization
  BURNUP_ISSUE: 10

jobs:
  burnup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: read
    steps:
      - name: Calculate and notify
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # プロジェクトアイテムを取得（Status と Story Points）
          ITEMS=$(gh project item-list $PROJECT_NUMBER \
            --owner "$ORG" \
            --format json \
            --jq '.items[] | {title: .title, status: .status, sp: (.["story Points"] // 0)}')

          # SP 集計（動的計算 — ハードコード不要）
          TOTAL_SP=$(echo "$ITEMS" | jq -s '[.[].sp] | add // 0')
          DONE_SP=$(echo "$ITEMS" | jq -s '[.[] | select(.status == "Done") | .sp] | add // 0')
          IN_PROGRESS_SP=$(echo "$ITEMS" | jq -s '[.[] | select(.status == "In Progress") | .sp] | add // 0')
          TODO_SP=$(echo "$ITEMS" | jq -s '[.[] | select(.status == "Todo") | .sp] | add // 0')
          REMAINING=$((TOTAL_SP - DONE_SP))

          # 曜日を取得 (JST)
          DAY=$(TZ=Asia/Tokyo date +%a)
          DATE=$(TZ=Asia/Tokyo date +%m/%d)
          case $DAY in
            Mon) DAY_JP="月" ;; Tue) DAY_JP="火" ;; Wed) DAY_JP="水" ;;
            Thu) DAY_JP="木" ;; Fri) DAY_JP="金" ;; *)   DAY_JP="—" ;;
          esac

          # 進捗率
          if [ "$TOTAL_SP" -gt 0 ]; then
            PCT=$((DONE_SP * 100 / TOTAL_SP))
          else
            PCT=0
          fi

          # 状態判定（消化率ベース）
          if [ "$PCT" -ge 80 ]; then
            STATUS="🚀 ほぼ完了"
          elif [ "$PCT" -ge 50 ]; then
            STATUS="✅ 順調"
          elif [ "$PCT" -ge 25 ]; then
            STATUS="⚠️ やや遅れ"
          else
            STATUS="🔴 遅れ"
          fi

          # Issue リスト
          DONE_LIST=$(echo "$ITEMS" | jq -rs '[.[] | select(.status == "Done") | "✅ \(.title) (\(.sp)SP)"] | join("\n")' || echo "なし")
          PROGRESS_LIST=$(echo "$ITEMS" | jq -rs '[.[] | select(.status == "In Progress") | "🔧 \(.title) (\(.sp)SP)"] | join("\n")' || echo "なし")
          TODO_LIST=$(echo "$ITEMS" | jq -rs '[.[] | select(.status == "Todo") | "📋 \(.title) (\(.sp)SP)"] | join("\n")' || echo "なし")

          # バーンアップチャート（テキスト）
          # スコープ線 = TOTAL_SP, 消化線 = DONE_SP を20文字幅で描画
          SCOPE_FILLED=$((TOTAL_SP > 0 ? 20 : 0))
          DONE_FILLED=$((TOTAL_SP > 0 ? DONE_SP * 20 / TOTAL_SP : 0))
          PROGRESS_FILLED=$((TOTAL_SP > 0 ? IN_PROGRESS_SP * 20 / TOTAL_SP : 0))

          DONE_BAR=$(printf '█%.0s' $(seq 1 $DONE_FILLED) 2>/dev/null || true)
          PROGRESS_BAR=$(printf '▓%.0s' $(seq 1 $PROGRESS_FILLED) 2>/dev/null || true)
          REMAIN_LEN=$((20 - DONE_FILLED - PROGRESS_FILLED))
          if [ "$REMAIN_LEN" -gt 0 ]; then
            REMAIN_BAR=$(printf '░%.0s' $(seq 1 $REMAIN_LEN) 2>/dev/null || true)
          else
            REMAIN_BAR=""
          fi

          CHART_DONE="${DONE_BAR}${PROGRESS_BAR}${REMAIN_BAR}"

          # --- Slack 通知 ---
          SLACK_PAYLOAD=$(cat <<PAYLOAD
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "📈 バーンアップ  ${DATE}(${DAY_JP})",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*スコープ:*\n${TOTAL_SP} SP"},
                  {"type": "mrkdwn", "text": "*消化:*\n${DONE_SP} SP"},
                  {"type": "mrkdwn", "text": "*進行中:*\n${IN_PROGRESS_SP} SP"},
                  {"type": "mrkdwn", "text": "*残:*\n${TODO_SP} SP"}
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*消化*  \`${CHART_DONE}\` ${PCT}%\n█ Done(${DONE_SP})  ▓ 進行中(${IN_PROGRESS_SP})  ░ 残(${TODO_SP})"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*状態:* ${STATUS}"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Done:*\n${DONE_LIST:-なし}\n\n*In Progress:*\n${PROGRESS_LIST:-なし}\n\n*Todo:*\n${TODO_LIST:-なし}"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<https://github.com/orgs/M4BS-Organization/projects/3|📋 Project Board> | <https://github.com/M4BS-Organization/ROUAsset-Manager/issues/10|📈 バーンアップIssue>"
                  }
                ]
              }
            ]
          }
          PAYLOAD
          )

          curl -s -X POST -H 'Content-type: application/json' \
            --data "$SLACK_PAYLOAD" \
            "$SLACK_WEBHOOK_URL"

          echo "Slack notification sent"

          # --- GitHub Issue にも記録 ---
          gh issue comment $BURNUP_ISSUE \
            --repo "$ORG/ROUAsset-Manager" \
            --body "## 📈 バーンアップ ${DATE}(${DAY_JP})

          | スコープ | 消化 | 進行中 | 残 | 状態 |
          |---------|------|--------|-----|------|
          | **${TOTAL_SP}** SP | **${DONE_SP}** SP | **${IN_PROGRESS_SP}** SP | **${TODO_SP}** SP | ${STATUS} |

          \`\`\`
          消化  ${CHART_DONE} ${PCT}%
          █ Done(${DONE_SP})  ▓ 進行中(${IN_PROGRESS_SP})  ░ 残(${TODO_SP})
          \`\`\`

          **Done:** ${DONE_LIST:-なし}
          **In Progress:** ${PROGRESS_LIST:-なし}
          **Todo:** ${TODO_LIST:-なし}"
