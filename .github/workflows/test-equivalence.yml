# 等価性検証テスト CI (Issue #29)
# Access版との計算結果一致を自動検証する
#
# トリガー:
#   - main/PR: 計算ロジック変更時に自動実行
#   - 手動: workflow_dispatch で任意タイミング実行
#   - スケジュール: 平日 JST 10:00 に定期実行

name: Equivalence Test

on:
  push:
    branches: [main]
    paths:
      - 'LeaseM4BS/LeaseM4BS.DataAccess/**'
      - 'test_equivalence.vb'
      - 'test_output_diff.vb'
      - 'test-data/**'
  pull_request:
    branches: [main]
    paths:
      - 'LeaseM4BS/LeaseM4BS.DataAccess/**'
      - 'test_equivalence.vb'
      - 'test_output_diff.vb'
      - 'test-data/**'
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1-5'  # 平日 JST 10:00 (UTC 1:00)

jobs:
  equivalence-test:
    name: 計算結果等価性検証
    runs-on: windows-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: MSBuild セットアップ
        uses: microsoft/setup-msbuild@v2

      - name: NuGet セットアップ
        uses: nuget/setup-nuget@v2

      - name: NuGet パッケージキャッシュ
        uses: actions/cache@v4
        with:
          path: |
            LeaseM4BS/packages
            ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: NuGet 復元
        run: nuget restore LeaseM4BS/LeaseM4BS.slnx

      - name: ビルド DataAccess (Release)
        run: msbuild LeaseM4BS/LeaseM4BS.DataAccess/LeaseM4BS.DataAccess.vbproj /p:Configuration=Release /p:Platform="AnyCPU" /m /verbosity:minimal

      - name: Roslyn VBC コンパイラ検出
        id: find-vbc
        shell: pwsh
        run: |
          $vbc = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "vbc.exe" -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -like "*Roslyn*" } |
                 Select-Object -First 1
          if ($vbc) {
            echo "VBC_PATH=$($vbc.FullName)" >> $env:GITHUB_OUTPUT
            Write-Host "Found VBC: $($vbc.FullName)"
          } else {
            Write-Host "::error::Roslyn VBC not found"
            exit 1
          }

      - name: DLL コピー
        run: |
          copy LeaseM4BS\LeaseM4BS.DataAccess\bin\Release\LeaseM4BS.DataAccess.dll .
          copy LeaseM4BS\LeaseM4BS.DataAccess\bin\Release\LeaseM4BS.DataAccess.dll LeaseM4BS\LeaseM4BS.DataAccess\bin\Debug\

      - name: 等価性テスト コンパイル
        run: |
          & "${{ steps.find-vbc.outputs.VBC_PATH }}" -reference:LeaseM4BS.DataAccess.dll -reference:System.Data.dll -out:test_equivalence.exe test_equivalence.vb

      - name: 出力差分テスト コンパイル
        run: |
          & "${{ steps.find-vbc.outputs.VBC_PATH }}" -reference:LeaseM4BS.DataAccess.dll -reference:System.Data.dll -out:test_output_diff.exe test_output_diff.vb

      - name: 等価性テスト実行
        id: equiv-test
        run: |
          .\test_equivalence.exe 2>&1 | Tee-Object -FilePath test_equivalence_result.txt
          $exitCode = $LASTEXITCODE
          echo "EXIT_CODE=$exitCode" >> $env:GITHUB_OUTPUT
          exit $exitCode

      - name: 出力差分テスト実行
        id: diff-test
        if: always()
        run: |
          .\test_output_diff.exe 2>&1 | Tee-Object -FilePath test_output_diff_result.txt
          $exitCode = $LASTEXITCODE
          echo "EXIT_CODE=$exitCode" >> $env:GITHUB_OUTPUT
          exit $exitCode

      - name: テスト結果サマリ生成
        if: always()
        shell: pwsh
        run: |
          $equivResult = Get-Content test_equivalence_result.txt -Tail 3 -ErrorAction SilentlyContinue
          $diffResult = Get-Content test_output_diff_result.txt -Tail 3 -ErrorAction SilentlyContinue

          $summary = @"
          ## 等価性検証テスト結果

          ### 計算結果等価性テスト (test_equivalence)
          ``````
          $($equivResult -join "`n")
          ``````

          ### 出力ファイル差分テスト (test_output_diff)
          ``````
          $($diffResult -join "`n")
          ``````

          > 🤖 Generated by [Equivalence Test CI](https://github.com/${{ github.repository }}/actions/workflows/test-equivalence.yml)
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: テスト結果アップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: equivalence-test-results
          path: |
            test_equivalence_result.txt
            test_output_diff_result.txt
            test-data/diff_report.csv
          retention-days: 30

      - name: PR コメント (失敗時)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let equivResult = '';
            let diffResult = '';
            try { equivResult = fs.readFileSync('test_equivalence_result.txt', 'utf8'); } catch {}
            try { diffResult = fs.readFileSync('test_output_diff_result.txt', 'utf8'); } catch {}

            // FAILの行のみ抽出
            const equivFails = equivResult.split('\n').filter(l => l.includes('FAIL')).join('\n');
            const diffFails = diffResult.split('\n').filter(l => l.includes('FAIL')).join('\n');

            const body = `## ⚠️ 等価性検証テスト失敗

            ### 計算結果テスト FAIL項目
            \`\`\`
            ${equivFails || '(なし)'}
            \`\`\`

            ### 出力差分テスト FAIL項目
            \`\`\`
            ${diffFails || '(なし)'}
            \`\`\`

            > 詳細は [Actions ログ](${context.payload.pull_request?.html_url}/checks) を確認してください。`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
